services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vision_total_ar
      POSTGRES_USER: vision_ar
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_ar -d vision_total_ar"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "scripts/docker-start.sh"]
    environment:
      DATABASE_DRIVER: pg
      DATABASE_URL: postgresql://vision_ar@db:5432/vision_total_ar
      PRISMA_DIRECT_TCP_URL: postgresql://vision_ar@db:5432/vision_total_ar
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vision_total_ar
      POSTGRES_USER: vision_ar
      DATABASE_SEED_ALLOW_REMOTE: "false"
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

volumes:
  postgres_data:
  app_node_modules:
  app_next:
