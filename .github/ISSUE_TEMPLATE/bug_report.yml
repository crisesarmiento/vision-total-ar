name: Bug report
description: Report a reproducible problem in Vision AR.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please include enough detail for someone outside your local setup to reproduce it.
        Maintainers may sync accepted bugs into Linear for implementation tracking while keeping this GitHub issue as the public intake record.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence that reproduces the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, preview URL, and whether you were logged in.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or console output
      description: Paste anything that helps narrow the failure quickly.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: This is not a security vulnerability disclosure.
          required: true
