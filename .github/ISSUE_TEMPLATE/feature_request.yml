name: Feature request
description: Propose a user-facing improvement or maintainer workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form for requests that should be discussed in the open.
        Maintainers may mirror accepted work into Linear for implementation tracking and keep GitHub as the public discussion surface.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or maintainer pain does this request address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the desired behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or competing approaches.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, videos, or references.
