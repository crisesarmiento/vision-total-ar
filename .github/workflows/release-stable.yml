name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish stable release from main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(jq -r '.version' package.json)"
          tag="v${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create stable release
        if: steps.version.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes

      - name: Summarize stable release result
        run: |
          echo "Version: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.version.outputs.create }}" == "true" ]]; then
            echo "Result: stable release created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: stable release already exists." >> "$GITHUB_STEP_SUMMARY"
          fi
