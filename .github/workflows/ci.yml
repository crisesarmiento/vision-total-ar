name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://vision:vision@localhost:5432/vision_ar
      PRISMA_DIRECT_TCP_URL: postgresql://vision:vision@localhost:5432/vision_ar
      BETTER_AUTH_SECRET: ci-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client
      GOOGLE_CLIENT_SECRET: ci-google-secret
      YOUTUBE_API_KEY: ci-youtube-key
      RESEND_API_KEY: ci-resend-key
      MAGIC_LINK_FROM: Vision AR <ci@example.com>
      UPLOADTHING_TOKEN: ci-uploadthing-token
      UPLOADTHING_SECRET: ci-uploadthing-secret
      UPLOADTHING_APP_ID: ci-uploadthing-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Validate repo skills
        run: npm run skills:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
