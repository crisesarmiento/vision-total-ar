name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://vision:vision@localhost:5432/vision_ar
      PRISMA_DIRECT_TCP_URL: postgresql://vision:vision@localhost:5432/vision_ar
      BETTER_AUTH_SECRET: ci-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client
      GOOGLE_CLIENT_SECRET: ci-google-secret
      YOUTUBE_API_KEY: ci-youtube-key
      RESEND_API_KEY: ci-resend-key
      MAGIC_LINK_FROM: Vision AR <ci@example.com>
      UPLOADTHING_TOKEN: ci-uploadthing-token
      UPLOADTHING_SECRET: ci-uploadthing-secret
      UPLOADTHING_APP_ID: ci-uploadthing-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Validate repo skills
        run: npm run skills:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vision
          POSTGRES_PASSWORD: vision
          POSTGRES_DB: vision_ar
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://vision:vision@localhost:5432/vision_ar
      PRISMA_DIRECT_TCP_URL: postgresql://vision:vision@localhost:5432/vision_ar
      BETTER_AUTH_SECRET: ci-secret-e2e
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client
      GOOGLE_CLIENT_SECRET: ci-google-secret
      YOUTUBE_API_KEY: ci-youtube-key
      RESEND_API_KEY: ci-resend-key
      MAGIC_LINK_FROM: Vision AR <ci@example.com>
      UPLOADTHING_TOKEN: ci-uploadthing-token
      UPLOADTHING_SECRET: ci-uploadthing-secret
      UPLOADTHING_APP_ID: ci-uploadthing-app
      BASE_URL: http://localhost:3000
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
