name: Production Database Migrations

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Run migration status or deploy pending migrations"
        required: true
        default: "status"
        type: choice
        options:
          - status
          - deploy

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Prisma migrate ${{ inputs.command }} on production
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_DRIVER: neon
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production database secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "Missing GitHub environment secret: PRODUCTION_DATABASE_URL" >&2
            exit 1
          fi

      - name: Check migration status
        if: inputs.command == 'status'
        run: npm run prisma:migrate:status

      - name: Deploy pending migrations
        if: inputs.command == 'deploy'
        run: npm run prisma:migrate:deploy

      - name: Verify migration status after deploy
        if: inputs.command == 'deploy'
        run: npm run prisma:migrate:status
