name: Prerelease

on:
  push:
    branches:
      - develop
    paths:
      - package.json

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prerelease:
    name: Publish prerelease from develop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect version change
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_version="$(jq -r '.version' package.json)"
          previous_version=""

          if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:package.json" | jq -r '.version')"
          fi

          if [[ "$current_version" == "$previous_version" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          existing_tag="$(git tag --points-at "$GITHUB_SHA" -l "v${current_version}-rc.*" | head -n 1)"

          if [[ -n "$existing_tag" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            if gh release view "$existing_tag" >/dev/null 2>&1; then
              echo "create=false" >> "$GITHUB_OUTPUT"
            else
              echo "create=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          last_rc="$(git tag -l "v${current_version}-rc.*" | sed -E 's/.*-rc\.([0-9]+)$/\1/' | sort -n | tail -n 1)"
          next_rc=$(( ${last_rc:-0} + 1 ))
          next_tag="v${current_version}-rc.${next_rc}"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "create=true" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create prerelease
        if: steps.version.outputs.changed == 'true' && steps.version.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --prerelease \
            --latest=false \
            --generate-notes \
            --notes "Prerelease cut from develop for version $VERSION."

      - name: Summarize prerelease result
        if: steps.version.outputs.changed == 'true'
        run: |
          echo "Version: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.version.outputs.create }}" == "true" ]]; then
            echo "Result: prerelease created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: prerelease already exists for this commit." >> "$GITHUB_STEP_SUMMARY"
          fi
