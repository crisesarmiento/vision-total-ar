name: Project Mirror

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - closed
      - labeled
      - unlabeled
      - assigned
      - unassigned
      - milestoned
      - demilestoned
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - converted_to_draft
      - closed
      - labeled
      - unlabeled
      - review_requested
      - review_request_removed
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: project-mirror-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  sync-project:
    name: Sync GitHub Project
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync project items and statuses
        env:
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PROJECT_OWNER: crisesarmiento
          PROJECT_OWNER_TYPE: user
          PROJECT_NUMBER: "4"
          PROJECT_STATUS_FIELD: Status
        run: node .github/scripts/sync-project-status.mjs
